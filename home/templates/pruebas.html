{% load static %}
<header class="fixed-header bg-stone-500 text-white w-full shadow-md">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
          <div class="-mr-2 flex md:hidden">
              <button id="mobile-menu-button" class="text-gray-50 hover:text-white inline-flex items-center justify-center p-2 rounded-md focus:outline-none">
                  <svg class="block h-6 w-6 fill-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                  </svg>
              </button>
          </div>
      </div>
  </div>
  
  <!-- Mobile menu, show/hide based on menu state. -->
  <div id="mobile-menu" class="md:hidden z-10 mobile-menu text-sm">
      <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
          <a href="#home" class="menu-item block px-3 py-2 rounded-md  font-medium text-white hover:bg-blue-950">Inicio</a>
      </div>
  </div>
</header>

<script src="https://kit.fontawesome.com/a076d05399.js"></script>

<script>
  // Functionality to keep the active menu item highlighted
  const menuItems = document.querySelectorAll('.menu-item');
  menuItems.forEach(item => {
      item.addEventListener('click', function () {
          menuItems.forEach(el => el.classList.remove('active'));
          this.classList.add('active');
      });
  });

  // Toggle mobile menu visibility
  const mobileMenuButton = document.getElementById('mobile-menu-button');
  const mobileMenu = document.getElementById('mobile-menu');
  mobileMenuButton.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
  });
</script>

<!-- FontAwesome para los iconos de redes sociales -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
